  frontend: []
  backend: []
  database: []
  analysis_tools:
    - "Python"
    - "Pillow"
    - "matplotlib"
    - "python-docx"
  experiment_tools:
    - "PyTorch"
    - "Lightning"
    - "torchvision"
    - "scikit-image"
    - "LPIPS"
  external_services: []
  notes: "论文为算法实验研究，不涉及Web系统和数据库。"

